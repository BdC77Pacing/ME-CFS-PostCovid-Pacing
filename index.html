<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacing App</title>
    <style>
        /* Basis-Reset für Barrierefreiheit */
        :root {
            --text-scale: 100%;
            --brightness-level: 100%;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: var(--text-scale);
            filter: brightness(var(--brightness-level));
            overflow-x: hidden;
        }

        /* ABSOLUTE ZENTRIERUNG FÜR CRASH-SCHUTZ */
        #crash-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 99999;
            box-sizing: border-box;
        }

        /* Atem-Animations-Block */
        .breath-container {
            width: 80%;
            max-width: 300px;
            aspect-ratio: 1;
            margin: 30px auto;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .breath-circle {
            width: 50%;
            height: 50%;
            background: #ffffff;
            border-radius: 50%;
            animation: breathe var(--breathe-duration, 5s) infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.6); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* Standard-Bedienungselemente im Notfall */
        .crash-slider {
            width: 80%;
            max-width: 300px;
            margin: 20px 0;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <main id="app-main">
        <h1 data-txt="app_title">Pacing App</h1>
        <button id="trigger-crash" onclick="activateCrashProtection()">Crash steht kurz bevor</button>
    </main>

    <div id="crash-screen" class="hidden">
        <h2 data-txt="crash_title">Ruhig atmen</h2>
        
        <div class="breath-container">
            <div class="breath-circle" id="breath-element"></div>
        </div>

        <input type="range" id="breathe-speed" class="crash-slider" min="2" max="10" value="5" oninput="adjustBreathing(this.value)">
        
        <button onclick="deactivateCrashProtection()" style="margin-top: 20px; padding: 10px 20px;">Schließen</button>
    </div>

    <script>
        // Dictionary für Zweisprachigkeit
        const translations = {
            de: {
                app_title: "Pacing App",
                crash_title: "Ruhig atmen"
            },
            en: {
                app_title: "Pacing App",
                crash_title: "Breathe slowly"
            }
        };

        // Aktivierung Crash-Schutz
        function activateCrashProtection() {
            const crashScreen = document.getElementById('crash-screen');
            crashScreen.classList.remove('hidden');
            
            // Software-Helligkeit sofort auf Minimum (20%)
            document.documentElement.style.setProperty('--brightness-level', '20%');
        }

        // Deaktivierung
        function deactivateCrashProtection() {
            const crashScreen = document.getElementById('crash-screen');
            crashScreen.classList.add('hidden');
            
            // Helligkeit zurücksetzen (oder auf vorherigen Slider-Wert)
            document.documentElement.style.setProperty('--brightness-level', '100%');
        }

        // Atemsynchronisation-Slider
        function adjustBreathing(value) {
            const duration = value + 's';
            document.getElementById('breath-element').style.setProperty('--breathe-duration', duration);
        }
    </script>
</body>
</html>
